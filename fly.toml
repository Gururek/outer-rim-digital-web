app = "outer-rim-server"
primary_region = "lhr"

[build]
  dockerfile = "packages/server/Dockerfile"

[http_service]
  internal_port = 2567
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "30s"
    method = "get"
    path = "/health"
    port = 2567
    timeout = "5s"
    type = "http"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
