app = "outer-rim-server"
primary_region = "lhr"

[build]
  dockerfile = "packages/server/Dockerfile"

[http_service]
  internal_port = 2567
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
